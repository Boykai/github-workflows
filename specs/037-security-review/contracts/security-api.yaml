openapi: 3.0.3
info:
  title: Security Audit API Changes
  version: 1.0.0
  description: |
    API contract changes resulting from the Security, Privacy & Vulnerability Audit.
    These are modifications to existing endpoints and new behaviors, not a standalone API.

paths:
  /api/v1/auth/github/callback:
    get:
      operationId: oauthCallback
      summary: OAuth callback — now sets HttpOnly cookie instead of URL redirect with token
      description: |
        After GitHub OAuth completes, the backend sets an HttpOnly; SameSite=Strict; Secure
        session cookie on the response and redirects to the frontend root URL with no
        credentials in the URL. Previously redirected with ?session_token=... in the URL.
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: OAuth authorization code from GitHub
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: OAuth state parameter for CSRF protection
      responses:
        '302':
          description: Redirect to frontend with session cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: |
                session_id=<token>; HttpOnly; SameSite=Strict; Secure; Path=/; Max-Age=<ttl>
            Location:
              schema:
                type: string
              description: Frontend root URL (no credentials in URL)
        '400':
          description: Invalid OAuth state or code

  /api/v1/auth/dev-login:
    post:
      operationId: devLogin
      summary: Dev login — credential now in POST body instead of URL query parameter
      description: |
        Development-only endpoint for authenticating with a GitHub Personal Access Token.
        The PAT is now sent in the JSON request body, never in the URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - github_token
              properties:
                github_token:
                  type: string
                  description: GitHub Personal Access Token
      responses:
        '200':
          description: Session created, cookie set
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session cookie (same attributes as OAuth callback)
        '401':
          description: Invalid token
        '404':
          description: Endpoint disabled in non-debug mode

  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user from session cookie
      description: |
        Returns the current user's profile based on the session cookie.
        This replaces the frontend reading session state from URL parameters.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: No valid session cookie

  /tasks/{project_id}:
    post:
      operationId: createTask
      summary: Create task — now includes project ownership verification
      description: |
        All project-scoped endpoints now verify the authenticated user owns the project
        before performing any action. Returns 403 if the user does not own the project.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      security:
        - cookieAuth: []
      responses:
        '201':
          description: Task created
        '403':
          description: User does not own the specified project
        '401':
          description: Not authenticated

  /ws/{project_id}:
    get:
      operationId: websocketConnect
      summary: WebSocket — now verifies project ownership before accepting connection
      description: |
        WebSocket connection requests now verify the authenticated user owns the project
        during the handshake. Unauthorized connections are rejected before any data is sent.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: WebSocket upgrade accepted (user owns project)
        '403':
          description: Connection rejected — user does not own project

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: |
        HttpOnly; SameSite=Strict; Secure session cookie set by the OAuth callback
        or dev-login endpoint. Not accessible to JavaScript.

  schemas:
    UserProfile:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: integer
          description: GitHub user ID
        username:
          type: string
          description: GitHub login name
        avatar_url:
          type: string
          description: GitHub avatar URL (validated against allowed domains)

    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: |
            Generic error message. Internal error details (e.g., from GitHub GraphQL API)
            are never exposed — only sanitized messages are returned.
          example: "GitHub API request failed"

    RateLimitError:
      type: object
      required:
        - detail
        - retry_after
      properties:
        detail:
          type: string
          description: Rate limit exceeded message
          example: "Rate limit exceeded. Try again later."
        retry_after:
          type: integer
          description: Seconds until the rate limit window resets
