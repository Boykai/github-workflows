openapi: 3.0.3
info:
  title: Bug Bash Report Schema
  description: |
    Schema definition for the bug bash summary report output.
    This is not an API endpoint — it defines the structure of the
    markdown summary table produced at the end of the bug bash review.
  version: 1.0.0

components:
  schemas:
    BugFinding:
      type: object
      required:
        - number
        - file
        - lines
        - category
        - description
        - status
      properties:
        number:
          type: integer
          minimum: 1
          description: Sequential finding number
          example: 1
        file:
          type: string
          description: Relative file path from repository root
          example: "solune/backend/src/api/auth.py"
        lines:
          type: string
          pattern: '^\d+(-\d+)?$'
          description: Line number or range
          example: "42-45"
        category:
          $ref: '#/components/schemas/BugCategory'
        description:
          type: string
          minLength: 1
          description: Clear description of the bug and why it is a bug
          example: "OAuth state parameter not validated on callback, allowing CSRF attacks"
        status:
          $ref: '#/components/schemas/FixStatus'
        commit:
          type: string
          nullable: true
          description: Commit hash of the fix (null for flagged items)
          example: "abc1234"
        regression_test:
          type: string
          nullable: true
          description: Test function name for the regression test (null for flagged items)
          example: "test_oauth_callback_rejects_missing_state"

    BugCategory:
      type: string
      enum:
        - Security
        - Runtime
        - Logic
        - Test Quality
        - Code Quality
      description: Bug classification category matching spec priority order

    FixStatus:
      type: string
      enum:
        - Fixed
        - Flagged (TODO)
      description: Resolution status of the finding

    SummaryReport:
      type: object
      required:
        - findings
        - total_fixed
        - total_flagged
        - total_files_reviewed
        - test_suite_status
      properties:
        findings:
          type: array
          items:
            $ref: '#/components/schemas/BugFinding'
          description: Ordered list of all bug findings
        total_fixed:
          type: integer
          minimum: 0
          description: Count of findings with status Fixed
        total_flagged:
          type: integer
          minimum: 0
          description: Count of findings with status Flagged (TODO)
        total_files_reviewed:
          type: integer
          minimum: 1
          description: Total number of files reviewed
        test_suite_status:
          type: string
          enum:
            - PASS
            - FAIL
          description: Final test suite status after all fixes

    TODOComment:
      type: object
      required:
        - marker
        - issue_description
        - options
        - reasoning
      properties:
        marker:
          type: string
          const: "TODO(bug-bash):"
          description: Standard marker prefix
        issue_description:
          type: string
          minLength: 1
          description: What the potential issue is
        options:
          type: string
          minLength: 1
          description: Available approaches to resolve
        reasoning:
          type: string
          minLength: 1
          description: Why this needs a human decision

  examples:
    SummaryReportMarkdown:
      summary: Expected markdown output format
      value: |
        | # | File | Line(s) | Category | Description | Status |
        |---|------|---------|----------|-------------|--------|
        | 1 | `solune/backend/src/api/auth.py` | 42-45 | Security | OAuth state parameter not validated | ✅ Fixed |
        | 2 | `solune/backend/src/services/database.py` | 100 | Runtime | Database connection not closed on error path | ✅ Fixed |
        | 3 | `solune/backend/src/api/webhooks.py` | 200-210 | Logic | Race condition in concurrent webhook handling | ⚠️ Flagged (TODO) |
