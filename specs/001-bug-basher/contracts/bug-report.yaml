openapi: 3.0.3
info:
  title: Bug Bash Report Schema
  description: |
    Schema definition for the bug-bash summary table output.
    This is a documentation contract — not a REST API endpoint.
    It defines the structure of the final bug-bash deliverable.
  version: 1.0.0

components:
  schemas:
    BugCategory:
      type: string
      enum:
        - Security
        - Runtime
        - Logic
        - Test Quality
        - Code Quality
      description: |
        Bug category, ordered by priority:
        - Security (P1): auth bypasses, injection risks, exposed secrets, insecure defaults
        - Runtime (P1): unhandled exceptions, race conditions, null references, resource leaks
        - Logic (P2): incorrect state transitions, wrong API calls, off-by-one errors
        - Test Quality (P2): untested paths, mock leaks, tautological assertions
        - Code Quality (P3): dead code, duplicated logic, silent failures

    BugStatus:
      type: string
      enum:
        - Fixed
        - Flagged
      description: |
        - Fixed: Bug resolved, tests updated, regression test added, all tests passing
        - Flagged: Ambiguous issue documented with TODO(bug-bash) comment for human review

    BugReportEntry:
      type: object
      required:
        - sequence
        - file
        - lines
        - category
        - description
        - status
      properties:
        sequence:
          type: integer
          minimum: 1
          description: Sequential number in the summary table
          example: 1
        file:
          type: string
          description: Relative file path from repository root
          example: "solune/backend/src/api/pipelines.py"
        lines:
          type: string
          description: Line number or range where the issue exists
          example: "42-45"
        category:
          $ref: '#/components/schemas/BugCategory'
        description:
          type: string
          description: Clear description of the bug and how the fix resolves it
          example: "SQL query uses string formatting instead of parameterized query — replaced with ? placeholders"
        status:
          $ref: '#/components/schemas/BugStatus'

    SummaryTable:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/BugReportEntry'
          description: All identified issues, ordered by discovery sequence
      example:
        entries:
          - sequence: 1
            file: "solune/backend/src/api/pipelines.py"
            lines: "42-45"
            category: "Security"
            description: "SQL injection risk — raw string interpolation in query replaced with parameterized binding"
            status: "Fixed"
          - sequence: 2
            file: "solune/backend/src/services/cache.py"
            lines: "100"
            category: "Runtime"
            description: "Potential None dereference when cache returns empty — added guard clause"
            status: "Fixed"
          - sequence: 3
            file: "solune/backend/src/config.py"
            lines: "55-60"
            category: "Security"
            description: "CORS allows all origins in production — ambiguous because config may be overridden by deployment"
            status: "Flagged"

    TodoBugBashComment:
      type: object
      required:
        - file
        - line
        - description
        - options
        - rationale
      properties:
        file:
          type: string
          description: File path where the comment is placed
        line:
          type: integer
          description: Line number of the comment
        description:
          type: string
          description: Clear description of the identified issue
        options:
          type: array
          items:
            type: string
          minItems: 2
          description: At least two resolution approaches
        rationale:
          type: string
          description: Why human decision is needed
      example:
        file: "solune/backend/src/config.py"
        line: 55
        description: "CORS allows all origins — may be intentional for development"
        options:
          - "Restrict CORS to specific origins in all environments"
          - "Keep permissive CORS but add environment guard"
        rationale: "Cannot determine deployment configuration from source code alone"
