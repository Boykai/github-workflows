# Onboarding API Contract — Updated for Help Tour Refresh
#
# Changes: current_step maximum raised from 10 to 13 to support 14 tour steps.
# No new endpoints — only validation boundary changes on existing PUT endpoint.

openapi: 3.0.3
info:
  title: Solune Onboarding API
  description: Onboarding tour state management endpoints.
  version: 1.1.0

paths:
  /api/v1/onboarding/state:
    get:
      summary: Get onboarding tour state
      description: Returns the current onboarding state for the authenticated user. Returns defaults (step 0, not completed) if no state exists.
      operationId: getOnboardingState
      tags: [Onboarding]
      security:
        - sessionAuth: []
      responses:
        '200':
          description: Onboarding state retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
        '401':
          description: Not authenticated.

    put:
      summary: Update onboarding tour state
      description: |
        Create or update the onboarding state for the authenticated user (UPSERT).
        Uses COALESCE to preserve existing `completed_at` and `dismissed_at` timestamps.
      operationId: updateOnboardingState
      tags: [Onboarding]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingStateUpdate'
      responses:
        '200':
          description: Onboarding state updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingState'
        '401':
          description: Not authenticated.
        '422':
          description: Validation error (e.g., current_step out of range 0–13).

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    OnboardingState:
      type: object
      required: [user_id, current_step, completed]
      properties:
        user_id:
          type: string
          description: GitHub user ID.
        current_step:
          type: integer
          minimum: 0
          maximum: 13
          default: 0
          description: Current 0-indexed tour step. CHANGED — maximum was 10, now 13.
        completed:
          type: boolean
          default: false
          description: Whether the user has completed the tour.
        dismissed_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the tour was dismissed.
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp when the tour was completed.

    OnboardingStateUpdate:
      type: object
      required: [current_step]
      properties:
        current_step:
          type: integer
          minimum: 0
          maximum: 13
          description: |
            Current 0-indexed tour step.
            CHANGED — maximum was 10, now 13 to support 14 tour steps (0–13).
        completed:
          type: boolean
          default: false
          description: Whether to mark the tour as completed.
        dismissed:
          type: boolean
          default: false
          description: Whether to mark the tour as dismissed.
