## Migration Notes

- **No breaking changes**: All endpoints accept the same request shapes as before.
- **Additive field**: `execution_mode` is optional with a safe default.
- **No API versioning required**: Existing clients remain fully functional.
- **No database migration**: The `stages` JSON column absorbs the new field transparently.
