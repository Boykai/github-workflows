# Pipeline API Contract: Parallel Agent Layout Extension

**Feature Branch**: `033-parallel-agent-layout`
**Date**: 2026-03-10
**Base URL**: `/pipelines/{project_id}`

## Summary of Changes

All existing endpoints remain unchanged in behavior. The only contract change is the addition of an optional `execution_mode` field on `PipelineStage` objects within the `stages` JSON array. This is a **backward-compatible, additive-only** change.

---

## Schema Changes

### PipelineStage (updated)

```yaml
PipelineStage:
  type: object
  required:
    - id
    - name
    - order
  properties:
    id:
      type: string
      format: uuid
      description: Unique stage identifier
    name:
      type: string
      minLength: 1
      maxLength: 100
      description: Display name for the stage
    order:
      type: integer
      minimum: 0
      description: Sequential position in the pipeline
    agents:
      type: array
      items:
        $ref: '#/components/schemas/PipelineAgentNode'
      default: []
      description: Ordered list of agents in this stage
    execution_mode:
      type: string
      enum: [sequential, parallel]
      default: sequential
      description: |
        NEW — Determines how agents in this stage execute.
        - "sequential": Agents run one after another (existing behavior).
        - "parallel": All agents start simultaneously; pipeline waits for all to complete.
```

### PipelineAgentNode (unchanged)

```yaml
PipelineAgentNode:
  type: object
  required:
    - id
    - agent_slug
  properties:
    id:
      type: string
      format: uuid
    agent_slug:
      type: string
    agent_display_name:
      type: string
      default: ""
    model_id:
      type: string
      default: ""
    model_name:
      type: string
      default: ""
    tool_ids:
      type: array
      items:
        type: string
      default: []
    tool_count:
      type: integer
      default: 0
    config:
      type: object
      default: {}
```

---

## Endpoint Details

### POST `/{project_id}` — Create Pipeline

**Request body** (unchanged structure, new optional field):

```yaml
PipelineConfigCreate:
  type: object
  required:
    - name
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
      maxLength: 500
      default: ""
    stages:
      type: array
      items:
        $ref: '#/components/schemas/PipelineStage'
      default: []
      description: |
        Each stage may now include execution_mode.
        Stages without execution_mode default to "sequential".
    blocking:
      type: boolean
      default: false
```

**Response** (`201 Created`): Full `PipelineConfig` object with `execution_mode` populated on all stages.

**Backward compatibility**: Clients sending stages without `execution_mode` get sequential behavior. No breaking change.

---

### PUT `/{project_id}/{pipeline_id}` — Update Pipeline

**Request body** (unchanged structure):

```yaml
PipelineConfigUpdate:
  type: object
  properties:
    name:
      type: string
      minLength: 1
      maxLength: 100
    description:
      type: string
      maxLength: 500
    stages:
      type: array
      items:
        $ref: '#/components/schemas/PipelineStage'
      description: |
        Full replacement of stages array.
        Stages may include execution_mode ("sequential" or "parallel").
    blocking:
      type: boolean
```

**Response** (`200 OK`): Full `PipelineConfig` object.

**Validation**: If `execution_mode` is `"parallel"` but `agents` contains fewer than 2 entries, the API SHOULD accept the request but MAY normalize the mode to `"sequential"` on save.

---

### GET `/{project_id}` — List Pipelines

**Response** (unchanged structure): Array of `PipelineConfigSummary` objects. Each includes the full `stages` array with `execution_mode` populated.

No filtering or sorting changes.

---

### GET `/{project_id}/{pipeline_id}` — Get Pipeline

**Response** (unchanged structure): Full `PipelineConfig` object with `execution_mode` on every stage.

---

### POST `/{project_id}/launch` — Launch Pipeline

**Request body** (unchanged):

```yaml
PipelineIssueLaunchRequest:
  type: object
  required:
    - issue_description
    - pipeline_id
  properties:
    issue_description:
      type: string
      minLength: 1
      maxLength: 65536
    pipeline_id:
      type: string
      minLength: 1
```

**Behavior change**: When the pipeline being launched contains stages with `execution_mode: "parallel"`, the execution engine creates sub-issues for all agents in that stage simultaneously and dispatches them concurrently. The pipeline does not advance until all parallel agents complete.

**Response** (unchanged structure): `WorkflowResult` object.

