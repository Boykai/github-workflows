openapi: 3.1.0
info:
  title: Activity Log / Audit Trail API
  version: 1.0.0
  description: >
    API contracts for the Activity Log / Audit Trail feature.
    All endpoints are scoped under /api/v1/activity and require authentication.

servers:
  - url: /api/v1
    description: Backend API (relative to app root)

paths:
  /activity:
    get:
      operationId: getActivityFeed
      summary: Get paginated activity feed for a project
      description: >
        Returns a paginated, reverse-chronological list of activity events
        scoped to a project. Supports filtering by event type and cursor-based
        pagination for consistent results during concurrent inserts.
      tags:
        - activity
      parameters:
        - name: project_id
          in: query
          required: true
          schema:
            type: string
          description: Project identifier to scope the feed
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of events per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: >
            Opaque cursor from a previous response's next_cursor.
            Omit for the first page.
        - name: event_type
          in: query
          required: false
          schema:
            type: string
          description: >
            Comma-separated list of event types to filter by.
            Example: "pipeline_run,chore_trigger"
      responses:
        '200':
          description: Paginated activity feed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivityResponse'
        '401':
          description: Unauthorized — no valid session
        '422':
          description: Validation error — invalid parameters

  /activity/{entity_type}/{entity_id}:
    get:
      operationId: getEntityHistory
      summary: Get activity history for a specific entity
      description: >
        Returns a paginated, reverse-chronological list of activity events
        for a specific entity (identified by type and ID). Used for entity-scoped
        history panels in detail views.
      tags:
        - activity
      parameters:
        - name: entity_type
          in: path
          required: true
          schema:
            type: string
            enum:
              - pipeline
              - chore
              - agent
              - app
              - tool
              - issue
          description: Type of the entity to query history for
        - name: entity_id
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the entity
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of events per page
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            nullable: true
          description: Opaque cursor for pagination
      responses:
        '200':
          description: Paginated entity history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedActivityResponse'
        '401':
          description: Unauthorized — no valid session
        '422':
          description: Validation error — invalid parameters

components:
  schemas:
    ActivityEvent:
      type: object
      required:
        - id
        - event_type
        - entity_type
        - entity_id
        - project_id
        - actor
        - action
        - summary
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique event identifier
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        event_type:
          type: string
          enum:
            - pipeline_run
            - pipeline_stage
            - chore_trigger
            - chore_crud
            - agent_crud
            - agent_execution
            - cleanup
            - app_crud
            - tool_crud
            - status_change
            - webhook
          description: Category of the action
          example: "pipeline_run"
        entity_type:
          type: string
          enum:
            - pipeline
            - chore
            - agent
            - app
            - tool
            - issue
          description: Type of the affected resource
          example: "pipeline"
        entity_id:
          type: string
          description: Identifier of the affected resource
          example: "pipeline-abc-123"
        project_id:
          type: string
          description: Project this event belongs to
          example: "PVT_abc123"
        actor:
          type: string
          description: Who performed the action (GitHub username or "system")
          example: "octocat"
        action:
          type: string
          enum:
            - created
            - updated
            - deleted
            - triggered
            - started
            - completed
            - failed
            - cancelled
            - moved
          description: Verb describing what happened
          example: "completed"
        summary:
          type: string
          description: Human-readable one-liner
          example: "Pipeline 'deploy-prod' completed successfully"
        detail:
          type: object
          nullable: true
          additionalProperties: true
          description: >
            Structured metadata specific to the event type.
            Contains old/new values, error messages, stage data, etc.
          example:
            pipeline_name: "deploy-prod"
            duration_ms: 45200
            stages_completed: 3
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the event occurred
          example: "2026-03-20T18:30:00Z"

    PaginatedActivityResponse:
      type: object
      required:
        - items
        - has_more
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivityEvent'
          description: Activity events for the current page
        next_cursor:
          type: string
          nullable: true
          description: >
            Opaque cursor for requesting the next page.
            Null when there are no more results.
          example: "MjAyNi0wMy0yMFQxODozMDowMFp8YTFiMmMzZDQ="
        has_more:
          type: boolean
          description: Whether more pages are available
          example: true
        total_count:
          type: integer
          nullable: true
          description: >
            Total number of matching events (may be null for performance).
            Provided on the first page when feasible.
          example: 1250
