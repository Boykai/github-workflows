openapi: 3.1.0
info:
  title: Agents Section API
  description: REST API for managing Custom GitHub Agents from the project board.
  version: 1.0.0

servers:
  - url: /api/v1
    description: Backend API base path

paths:
  /agents/{project_id}:
    get:
      operationId: listAgents
      summary: List all agents for a project
      description: |
        Merges agents from SQLite (local/pending) and GitHub repository
        (.github/agents/*.agent.md), deduplicated by slug. GitHub repo
        version takes precedence for content when both exist.
      tags: [agents]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: GitHub Project node ID
      responses:
        '200':
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Agent'
        '401':
          description: Not authenticated

    post:
      operationId: createAgent
      summary: Create a new Custom GitHub Agent
      description: |
        Validates input, generates .agent.md and .prompt.md files,
        creates a branch, commits files, opens a PR, creates a tracking
        issue, and saves to SQLite. The agent is immediately available
        for pipeline assignment.
      tags: [agents]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreate'
      responses:
        '201':
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateResult'
        '400':
          description: Validation error (invalid name, duplicate slug, prompt too long)
        '401':
          description: Not authenticated

  /agents/{project_id}/{agent_id}:
    patch:
      operationId: updateAgent
      summary: Update an existing agent (P3)
      description: |
        Updates agent configuration and opens a PR with modified
        .agent.md and .prompt.md files.
      tags: [agents]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdate'
      responses:
        '200':
          description: Agent updated, PR opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentCreateResult'
        '400':
          description: Validation error
        '401':
          description: Not authenticated
        '404':
          description: Agent not found

    delete:
      operationId: deleteAgent
      summary: Delete an agent
      description: |
        Creates a GitHub Issue and opens a PR to remove the agent's
        .agent.md and .prompt.md files from the repository. Removes
        the local SQLite record.
      tags: [agents]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
          description: Agent UUID or slug
      responses:
        '200':
          description: Deletion PR opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentDeleteResult'
        '401':
          description: Not authenticated
        '404':
          description: Agent not found

  /agents/{project_id}/chat:
    post:
      operationId: agentChat
      summary: AI-assisted agent content refinement
      description: |
        Multi-turn chat flow for refining sparse agent descriptions
        into complete configurations. Returns AI responses, clarifying
        questions, and eventually an agent preview.
      tags: [agents]
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentChatMessage'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentChatResponse'
        '401':
          description: Not authenticated

components:
  schemas:
    AgentStatus:
      type: string
      enum: [active, pending_pr, pending_deletion]
      description: Agent lifecycle state

    AgentSource:
      type: string
      enum: [local, repo, both]
      description: Where the agent data was loaded from

    Agent:
      type: object
      required: [id, name, slug, description, status, source]
      properties:
        id:
          type: string
          description: UUID (SQLite) or derived ID (repo)
        name:
          type: string
          description: Display name
        slug:
          type: string
          description: Kebab-case file identifier
        description:
          type: string
          description: One-line purpose summary
        system_prompt:
          type: string
          description: Full system prompt content
        status:
          $ref: '#/components/schemas/AgentStatus'
        tools:
          type: array
          items:
            type: string
          default: []
        status_column:
          type: string
          nullable: true
          description: Assigned pipeline column
        github_issue_number:
          type: integer
          nullable: true
        github_pr_number:
          type: integer
          nullable: true
        branch_name:
          type: string
          nullable: true
        source:
          $ref: '#/components/schemas/AgentSource'
        created_at:
          type: string
          nullable: true
          description: ISO 8601 timestamp

    AgentCreate:
      type: object
      required: [name, description, system_prompt]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          minLength: 1
          maxLength: 500
        system_prompt:
          type: string
          minLength: 1
          maxLength: 30000
        tools:
          type: array
          items:
            type: string
          default: []
        status_column:
          type: string
          default: ""

    AgentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          minLength: 1
          maxLength: 500
        system_prompt:
          type: string
          minLength: 1
          maxLength: 30000
        tools:
          type: array
          items:
            type: string

    AgentCreateResult:
      type: object
      required: [agent, pr_url]
      properties:
        agent:
          $ref: '#/components/schemas/Agent'
        pr_url:
          type: string
          description: URL of the created pull request
        pr_number:
          type: integer
        issue_number:
          type: integer
          nullable: true
        branch_name:
          type: string

    AgentDeleteResult:
      type: object
      required: [success, pr_url]
      properties:
        success:
          type: boolean
        pr_url:
          type: string
          description: URL of the deletion pull request
        pr_number:
          type: integer
        issue_number:
          type: integer
          nullable: true

    AgentChatMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
          description: User input in the chat flow
        session_id:
          type: string
          nullable: true
          description: Session ID for multi-turn continuity

    AgentChatResponse:
      type: object
      required: [reply, session_id, is_complete]
      properties:
        reply:
          type: string
          description: AI response text
        session_id:
          type: string
        is_complete:
          type: boolean
          description: True when agent config is ready
        preview:
          $ref: '#/components/schemas/AgentPreview'
          nullable: true
          description: Present when is_complete=true

    AgentPreview:
      type: object
      required: [name, slug, description, system_prompt]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        system_prompt:
          type: string
        status_column:
          type: string
          default: ""
        tools:
          type: array
          items:
            type: string
          default: []
