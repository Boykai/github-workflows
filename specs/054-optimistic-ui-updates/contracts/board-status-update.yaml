openapi: 3.1.0
info:
  title: Board Status Update API
  description: >
    New endpoint for updating a board item's status by name.
    Part of the Optimistic UI Updates feature (054-optimistic-ui-updates).
  version: 1.0.0

paths:
  /api/v1/board/projects/{project_id}/items/{item_id}/status:
    patch:
      operationId: updateBoardItemStatus
      summary: Update a board item's status
      description: >
        Changes the status of a board item by resolving the given status name
        to the project's status field option. Case-insensitive match.
        Delegates to the existing `update_item_status_by_name()` service function.
      tags:
        - board
      security:
        - sessionAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          description: GitHub Projects V2 node ID
          schema:
            type: string
            example: "PVT_kwHOBmyR984AXXXX"
        - name: item_id
          in: path
          required: true
          description: Project item node ID
          schema:
            type: string
            example: "PVTI_lAHOBmyR984AXXXX"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
            example:
              status: "Done"
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusUpdateResponse'
              example:
                success: true
        '400':
          description: Invalid request (missing or empty status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Status name is required"
                details: {}
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Status name not found in project configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Status not found"
                details:
                  status: "NonExistentStatus"
        '502':
          description: GitHub API error during status update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Failed to update item status"
                details:
                  reason: "GitHub API returned an error"

components:
  schemas:
    StatusUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          minLength: 1
          description: >
            Target status name. Must match one of the project's configured
            status options (case-insensitive).
          example: "Done"

    StatusUpdateResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: Whether the status update was successfully applied

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie set after OAuth authentication
