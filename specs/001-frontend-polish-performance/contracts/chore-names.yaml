openapi: 3.0.3
info:
  title: Chore Names API
  description: Lightweight endpoint returning unpaginated chore names for template membership checks.
  version: 1.0.0

paths:
  /api/v1/chores/{project_id}/chore-names:
    get:
      operationId: getChoreNames
      summary: List all chore names for a project
      description: |
        Returns a flat list of all chore names for the specified project,
        unpaginated and unfiltered. Intended for set-membership checks
        against template names to determine which templates have already
        been created as chores.
      tags:
        - Chores
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: The project identifier
      responses:
        '200':
          description: Successful response with all chore names
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example:
                  - "Daily Standup Prep"
                  - "PR Review Reminder"
                  - "Sprint Metrics Report"
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Project not found"
        '401':
          description: Authentication required
        '500':
          description: Internal server error
