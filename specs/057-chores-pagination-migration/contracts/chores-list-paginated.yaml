# OpenAPI Contract: GET /chores/{project_id} (Paginated with Filters)
# Feature: 057-chores-pagination-migration

openapi: "3.1.0"
info:
  title: Chores API — Paginated Listing with Filters
  version: "1.0.0"
  description: >
    Contract for the chores listing endpoint with server-side filtering,
    sorting, and cursor-based pagination. This extends the existing
    GET /chores/{project_id} endpoint with optional filter and sort
    query parameters.

paths:
  /chores/{project_id}:
    get:
      operationId: listChores
      summary: List chores for a project with optional filtering, sorting, and pagination
      description: >
        Returns chores belonging to the specified project. When `limit` or `cursor`
        is provided, returns a paginated response. Filter and sort parameters are
        applied server-side before pagination, ensuring complete filtered results
        across all pages.

        Without `limit` or `cursor`, returns the full list of chores (backward
        compatible behavior).
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
          description: The project identifier

        # Pagination parameters (existing)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          description: Maximum number of items per page

        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: >
            Opaque pagination cursor from a previous response's `next_cursor`.
            Omit for the first page.

        # Filter parameters (new)
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, paused]
          description: >
            Filter chores by status. Omit to include all statuses.

        - name: schedule_type
          in: query
          required: false
          schema:
            type: string
            enum: [time, count, unscheduled]
          description: >
            Filter chores by schedule type. Use `unscheduled` to match chores
            with no schedule (null schedule_type). Omit to include all types.

        - name: search
          in: query
          required: false
          schema:
            type: string
          description: >
            Case-insensitive substring search across chore `name` and
            `template_path`. Omit to skip search filtering.

        # Sort parameters (new)
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [name, updated_at, created_at, attention]
            default: created_at
          description: >
            Sort field. `attention` uses a priority scoring system:
            0 = active + no schedule, 1 = has current issue, 2 = normal, 3 = paused.
            Default: `created_at`.

        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction. Default: `asc`.

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                oneOf:
                  - description: >
                      Paginated response (when `limit` or `cursor` is provided).
                      Filters and sorting are applied before pagination.
                    type: object
                    required: [items, next_cursor, has_more, total_count]
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Chore"
                        description: Current page of chores (max `limit` items)
                      next_cursor:
                        type: string
                        nullable: true
                        description: >
                          Opaque cursor for the next page. Null when no more pages exist.
                      has_more:
                        type: boolean
                        description: Whether additional pages are available
                      total_count:
                        type: integer
                        description: >
                          Total number of chores matching the active filters
                          (before pagination). Useful for displaying "showing X of Y".
                  - description: >
                      Full list response (when neither `limit` nor `cursor` is provided).
                      Backward compatible — returns all chores as a plain array.
                      Filters and sorting are still applied.
                    type: array
                    items:
                      $ref: "#/components/schemas/Chore"

        "400":
          description: Validation error (invalid filter values, invalid cursor)
        "401":
          description: Unauthorized — invalid or missing session
        "403":
          description: Forbidden — no access to the specified project

components:
  schemas:
    Chore:
      type: object
      required:
        - id
        - project_id
        - name
        - template_path
        - template_content
        - status
        - last_triggered_count
        - execution_count
        - ai_enhance_enabled
        - agent_pipeline_id
        - is_preset
        - preset_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique chore identifier
        project_id:
          type: string
          description: Parent project identifier
        name:
          type: string
          description: Chore display name
        template_path:
          type: string
          description: Path to the chore template file
        template_content:
          type: string
          description: Template body content
        schedule_type:
          type: string
          nullable: true
          enum: [time, count]
          description: Schedule type (null if unscheduled)
        schedule_value:
          type: integer
          nullable: true
          description: Schedule interval value
        status:
          type: string
          enum: [active, paused]
          description: Current chore status
        last_triggered_at:
          type: string
          nullable: true
          description: ISO 8601 timestamp of last trigger
        last_triggered_count:
          type: integer
          description: Counter for trigger-based schedules
        current_issue_number:
          type: integer
          nullable: true
          description: Currently open GitHub issue number
        current_issue_node_id:
          type: string
          nullable: true
          description: GraphQL node ID of current issue
        pr_number:
          type: integer
          nullable: true
          description: Associated pull request number
        pr_url:
          type: string
          nullable: true
          description: Associated pull request URL
        tracking_issue_number:
          type: integer
          nullable: true
          description: Parent tracking issue number
        execution_count:
          type: integer
          description: Total execution count
        ai_enhance_enabled:
          type: boolean
          description: Whether AI enhancement is enabled
        agent_pipeline_id:
          type: string
          description: Pipeline configuration ID
        is_preset:
          type: boolean
          description: Whether this is a preset chore
        preset_id:
          type: string
          description: Preset identifier (empty string if not a preset)
        created_at:
          type: string
          description: ISO 8601 timestamp of creation
        updated_at:
          type: string
          description: ISO 8601 timestamp of last update
