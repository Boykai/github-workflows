## Requirements Mapping

| Requirement | Contract Element |
|-------------|-----------------|
| FR-013 | `recover_pipeline_states_from_labels()` triggered on startup |
| FR-014 | `recover_single_item_state()` + `set_pipeline_state()` |
| FR-015 | `confidence` field + `requires_manual_review` flag + logging |
| FR-016 | `recovered_at` timestamp checked by polling to skip re-processing |
