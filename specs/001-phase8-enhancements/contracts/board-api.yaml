# Board API Contract

**Feature**: `001-phase8-enhancements` | **Stories**: US-3 Board Projection, US-4 Pipeline Config Filter  
**Type**: Frontend hook interfaces + component props

## Frontend: Board Projection (`useBoardProjection`)

### Interface

```typescript
interface BoardProjectionConfig {
  /** Number of items to render beyond the viewport (default: 10) */
  bufferSize?: number;
  /** Debounce time for scroll events in ms (default: 150) */
  scrollDebounce?: number;
  /** Threshold for intersection observer (0.0–1.0, default: 0.1) */
  intersectionThreshold?: number;
}

interface ColumnProjection {
  /** Column identifier (status name) */
  columnId: string;
  /** Index range of rendered items in this column */
  renderedRange: { start: number; end: number };
  /** Total item count in this column */
  totalItems: number;
  /** Whether more items exist beyond rendered range */
  hasMore: boolean;
}

interface UseBoardProjectionReturn {
  /** Per-column projection state */
  columnProjections: Map<string, ColumnProjection>;
  /** Ref callback to attach to scrollable column containers */
  observerRef: (columnId: string) => (node: HTMLElement | null) => void;
  /** Whether initial render is complete */
  isInitialRenderComplete: boolean;
  /** Total items rendered across all columns */
  totalRenderedItems: number;
  /** Total items in full dataset */
  totalDatasetItems: number;
}

function useBoardProjection(
  boardData: BoardDataResponse,
  config?: BoardProjectionConfig,
): UseBoardProjectionReturn;
```

### Integration with `ProjectBoard.tsx`

```typescript
const { columnProjections, observerRef, isInitialRenderComplete } = useBoardProjection(boardData);

// In BoardColumn rendering:
<BoardColumn
  items={getProjectedItems(column, columnProjections.get(column.status))}
  scrollRef={observerRef(column.status)}
  isLoading={!isInitialRenderComplete}
/>
```

## Frontend: Pipeline Config Filter

### Interface

```typescript
interface PipelineConfigOption {
  /** Pipeline config unique identifier */
  id: string;
  /** Human-readable name */
  name: string;
  /** Count of items with this pipeline config */
  itemCount: number;
}

// Extension to existing BoardFilterState in useBoardControls.ts
interface BoardFilterState {
  // ... existing fields (labels, assignees, milestones) ...
  /** Selected pipeline config ID, null = "All Pipelines" */
  pipelineConfigId: string | null;
}
```

### `BoardToolbar.tsx` Pipeline Filter Props

```typescript
interface PipelineFilterProps {
  /** Available pipeline configurations */
  pipelineConfigs: PipelineConfigOption[];
  /** Currently selected pipeline config ID */
  selectedConfigId: string | null;
  /** Callback when selection changes */
  onPipelineConfigChange: (configId: string | null) => void;
}
```

### Component Structure

```text
BoardToolbar
├── Search input (existing)
├── Filter panel (existing: labels, assignees, milestones)
│   └── Pipeline Config dropdown (NEW)
│       ├── "All Pipelines" option (default)
│       └── {config.name} (×N, one per pipeline config)
├── Sort panel (existing)
└── Group By panel (existing)
```

### Filtering Logic

```typescript
function filterBoardItems(
  items: BoardItem[],
  filterState: BoardFilterState,
): BoardItem[] {
  let filtered = items;
  
  // ... existing label/assignee/milestone filters ...
  
  // Pipeline config filter (new)
  if (filterState.pipelineConfigId !== null) {
    filtered = filtered.filter(
      item => item.pipelineConfigId === filterState.pipelineConfigId
    );
  }
  
  return filtered;
}
```

## Requirements Mapping

| Requirement | Contract Element |
|-------------|-----------------|
| FR-007 | `useBoardProjection` initial render with buffer |
| FR-008 | `observerRef` intersection observer for scroll loading |
| FR-009 | Filtering operates on `boardData` (full dataset), not projected items |
| FR-010 | `PipelineFilterProps` with `pipelineConfigs` list + "All Pipelines" |
| FR-011 | `filterBoardItems()` client-side filtering by `pipelineConfigId` |
| FR-012 | Filter state in `useBoardControls` persists across polling updates |
