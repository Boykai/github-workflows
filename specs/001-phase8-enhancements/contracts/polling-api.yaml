# Polling API Contract

**Feature**: `001-phase8-enhancements` | **Story**: US-1 Adaptive Polling  
**Type**: Frontend hook interface + Backend polling configuration

## Frontend: `useAdaptivePolling` Hook

### Interface

```typescript
interface AdaptivePollingConfig {
  /** Base polling interval in ms (default: 10000) */
  baseInterval?: number;
  /** Minimum polling interval in ms (default: 3000) */
  minInterval?: number;
  /** Maximum polling interval in ms (default: 30000) */
  maxInterval?: number;
  /** Maximum backoff interval in ms (default: 60000) */
  maxBackoffInterval?: number;
  /** Sliding window size for activity detection (default: 5) */
  windowSize?: number;
  /** Activity score threshold for high tier (default: 0.6) */
  highActivityThreshold?: number;
  /** Activity score threshold for medium tier (default: 0.2) */
  mediumActivityThreshold?: number;
}

interface AdaptivePollingState {
  /** Current polling interval in ms */
  currentInterval: number;
  /** Current activity tier */
  tier: 'high' | 'medium' | 'low' | 'backoff';
  /** Current activity score (0.0–1.0) */
  activityScore: number;
  /** Whether polling is currently paused */
  isPaused: boolean;
}

interface UseAdaptivePollingReturn {
  /** Dynamic refetchInterval function for TanStack Query */
  getRefetchInterval: () => number | false;
  /** Report whether the last poll detected changes */
  reportPollResult: (hasChanges: boolean) => void;
  /** Report a poll failure (triggers backoff) */
  reportPollFailure: () => void;
  /** Report a poll success after failures (resets backoff) */
  reportPollSuccess: () => void;
  /** Force an immediate poll (e.g., on tab focus) */
  triggerImmediatePoll: () => void;
  /** Current polling state */
  state: AdaptivePollingState;
}

function useAdaptivePolling(config?: AdaptivePollingConfig): UseAdaptivePollingReturn;
```

### Usage with `useProjectBoard`

```typescript
const { getRefetchInterval, reportPollResult, reportPollFailure } = useAdaptivePolling();

const { data } = useQuery({
  queryKey: ['board', projectId],
  queryFn: fetchBoard,
  refetchInterval: getRefetchInterval,
  onSuccess: (newData) => {
    const hasChanges = detectChanges(previousData, newData);
    reportPollResult(hasChanges);
  },
  onError: () => {
    reportPollFailure();
  },
});
```

