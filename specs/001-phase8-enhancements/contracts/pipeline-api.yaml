### Concurrency Control Flow

```text
trigger_pipelines(project_id, configs)
│
├─ acquire get_project_launch_lock(project_id)
│
├─ check is_queue_mode_enabled(project_id)
│   │
│   ├─ YES → sequential dispatch (existing behavior)
│   │         release lock after each pipeline completes
│   │
│   └─ NO  → concurrent dispatch
│            │
│            ├─ generate concurrent_group_id
│            ├─ release lock (allow other projects)
│            ├─ for each independent pipeline config:
│            │   └─ task_registry.create_task(
│            │        execute_pipeline_concurrent(config, ctx, group_id)
│            │      )
│            └─ await all tasks (TaskGroup)
│                 each task has independent try/except
```

## Requirements Mapping

| Requirement | Contract Element |
|-------------|-----------------|
| FR-004 | `dispatch_pipelines()` with concurrent mode |
| FR-005 | `is_isolated: True` + independent try/except per task |
| FR-006 | `is_queue_mode_enabled()` gate before concurrent dispatch |
