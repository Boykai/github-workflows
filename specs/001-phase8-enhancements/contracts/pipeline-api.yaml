# Pipeline API Contract

**Feature**: `001-phase8-enhancements` | **Story**: US-2 Concurrent Pipeline Execution  
**Type**: Backend API extension + internal service interface

## Backend: Concurrent Pipeline Dispatch

### Internal Service Interface

```python
# In workflow_orchestrator/orchestrator.py

async def dispatch_pipelines(
    project_id: str,
    pipeline_configs: list[PipelineConfig],
    context: WorkflowContext,
) -> list[PipelineExecution]:
    """
    Dispatch multiple pipelines for a project.
    
    - If queue_mode is enabled: execute sequentially (existing behavior).
    - If queue_mode is disabled: dispatch independent pipelines concurrently
      via task_registry.
    
    Returns list of PipelineExecution results.
    """

async def execute_pipeline_concurrent(
    pipeline_config: PipelineConfig,
    context: WorkflowContext,
    concurrent_group_id: str,
) -> PipelineExecution:
    """
    Execute a single pipeline as part of a concurrent group.
    Fault-isolated: failures do not propagate to siblings.
    """
```

