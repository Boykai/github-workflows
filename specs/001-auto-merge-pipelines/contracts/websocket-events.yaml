## Frontend Integration

### useRealTimeSync.ts — New Event Handling

```typescript
// Add to existing WebSocket message handler switch/case:

case 'auto_merge_completed':
  toast.success(`PR #${message.pr_number} squash-merged`);
  queryClient.invalidateQueries(['projects', projectId, 'tasks']);
  break;

case 'auto_merge_failed':
  toast.error(`Auto merge failed: ${message.error}`);
  queryClient.invalidateQueries(['projects', projectId, 'tasks']);
  break;

case 'devops_triggered':
  toast.info(`DevOps agent resolving CI failure on #${message.issue_number}`);
  break;
```

### Toast Styling

- **Success** (`auto_merge_completed`): Green, with GitMerge icon
- **Error** (`auto_merge_failed`): Red, with AlertCircle icon
- **Info** (`devops_triggered`): Blue, with Wrench icon
