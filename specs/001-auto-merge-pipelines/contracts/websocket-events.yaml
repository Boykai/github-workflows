# WebSocket Event Contracts — Auto Merge Notifications

## Event: `auto_merge_completed`

**Trigger**: Successful squash-merge of parent PR.
**Broadcast**: To all WebSocket connections for the project.
**Frontend Action**: Success toast — "PR #X squash-merged."

```yaml
AutoMergeCompletedEvent:
  type: object
  required: [type, issue_number, pr_number, timestamp]
  properties:
    type:
      type: string
      const: auto_merge_completed
    issue_number:
      type: integer
      description: Parent issue number for the pipeline
    pr_number:
      type: integer
      description: PR number that was squash-merged
    merge_commit:
      type: string
      description: SHA of the merge commit on the default branch
    timestamp:
      type: string
      format: date-time
```

**Example**:
```json
{
  "type": "auto_merge_completed",
  "issue_number": 42,
  "pr_number": 123,
  "merge_commit": "a1b2c3d4e5f6",
  "timestamp": "2026-03-22T18:00:00Z"
}
```

---

## Event: `auto_merge_failed`

**Trigger**: Merge attempt failed (API error, unrecoverable state, or DevOps retry cap exceeded).
**Broadcast**: To all WebSocket connections for the project.
**Frontend Action**: Error toast with details — "Auto merge failed for PR #X: {error}."

```yaml
AutoMergeFailedEvent:
  type: object
  required: [type, issue_number, timestamp]
  properties:
    type:
      type: string
      const: auto_merge_failed
    issue_number:
      type: integer
      description: Parent issue number for the pipeline
    pr_number:
      type: integer
      nullable: true
      description: PR number that failed to merge (null if PR not discovered)
    error:
      type: string
      description: Human-readable error message
    timestamp:
      type: string
      format: date-time
```

**Example**:
```json
{
  "type": "auto_merge_failed",
  "issue_number": 42,
  "pr_number": 123,
  "error": "Branch protection requires 2 approving reviews",
  "timestamp": "2026-03-22T18:00:05Z"
}
```

---

## Event: `devops_triggered`

**Trigger**: DevOps agent dispatched to fix a CI failure on an auto-merge-enabled pipeline.
**Broadcast**: To all WebSocket connections for the project.
**Frontend Action**: Info toast — "DevOps agent resolving CI failure on #X."

```yaml
DevOpsTriggeredEvent:
  type: object
  required: [type, issue_number, attempt, timestamp]
  properties:
    type:
      type: string
      const: devops_triggered
    issue_number:
      type: integer
      description: Parent issue number for the pipeline
    pr_number:
      type: integer
      nullable: true
      description: PR number with the CI failure
    attempt:
      type: integer
      description: DevOps retry attempt number (1 or 2)
    reason:
      type: string
      description: Brief description of the CI failure triggering dispatch
    timestamp:
      type: string
      format: date-time
```

**Example**:
```json
{
  "type": "devops_triggered",
  "issue_number": 42,
  "pr_number": 123,
  "attempt": 1,
  "reason": "CI check 'unit-tests' failed with conclusion 'failure'",
  "timestamp": "2026-03-22T18:00:10Z"
}
```

