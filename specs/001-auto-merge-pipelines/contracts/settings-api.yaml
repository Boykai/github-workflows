# Settings API Contract Extensions — Auto Merge

## PUT `/api/v1/settings/project/{project_id}`

### Request Body Extension

Extends existing `ProjectSettingsUpdate` with optional `auto_merge` field:

```yaml
ProjectSettingsUpdate:
  type: object
  properties:
    board_display_config:
      $ref: '#/components/schemas/ProjectBoardConfig'
      nullable: true
    agent_pipeline_mappings:
      type: object
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/ProjectAgentMapping'
      nullable: true
    queue_mode:
      type: boolean
      nullable: true
      description: Enable/disable queue mode for this project
    auto_merge:                          # NEW
      type: boolean
      nullable: true
      description: Enable/disable auto merge for this project
```

### Response Body Extension

Extends `EffectiveProjectSettings.project.board_display_config`:

```yaml
ProjectBoardConfig:
  type: object
  properties:
    column_order:
      type: array
      items:
        type: string
    collapsed_columns:
      type: array
      items:
        type: string
    show_estimates:
      type: boolean
      default: false
    queue_mode:
      type: boolean
      default: false
    auto_merge:                          # NEW
      type: boolean
      default: false
      description: Whether pipelines auto-merge parent PRs on completion
```

### Behavior

1. When `auto_merge` is included in the request body:
   - Convert to `int` (0/1) for SQLite storage.
   - Upsert to the user's `project_settings` row.
   - Sync to the `__workflow__` canonical row (same pattern as `queue_mode`).
   - Invalidate the `_auto_merge_cache` for the project.

2. When reading effective settings:
   - Merge `auto_merge` column value into `ProjectBoardConfig` (same as `queue_mode`).
   - Return in the `board_display_config` object.

### Example

**Request**:
```json
PUT /api/v1/settings/project/PVT_abc123
Content-Type: application/json

{
  "auto_merge": true
}
```

**Response** (200 OK):
```json
{
  "project": {
    "project_id": "PVT_abc123",
    "board_display_config": {
      "column_order": ["Backlog", "In Progress", "In Review", "Done"],
      "collapsed_columns": [],
      "show_estimates": false,
      "queue_mode": false,
      "auto_merge": true
    },
    "agent_pipeline_mappings": null
  }
}
```
