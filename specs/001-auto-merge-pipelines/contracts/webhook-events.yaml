## check_suite Event

**GitHub Event**: `check_suite`
**Trigger**: When an entire CI check suite completes with failures.
**Routing Condition**: `action == "completed"` AND `conclusion == "failure"`

### Pydantic Model: `CheckSuiteEvent`

```yaml
CheckSuiteEvent:
  type: object
  required: [action, check_suite, repository]
  properties:
    action:
      type: string
      enum: [completed, requested, rerequested]
    check_suite:
      $ref: '#/components/schemas/CheckSuiteData'
    repository:
      $ref: '#/components/schemas/RepositoryData'

CheckSuiteData:
  type: object
  required: [id, status, head_sha]
  properties:
    id:
      type: integer
    status:
      type: string
      enum: [queued, in_progress, completed]
    conclusion:
      type: string
      nullable: true
      enum: [success, failure, neutral, cancelled, skipped, timed_out, action_required, stale]
    head_sha:
      type: string
      description: Commit SHA the check suite ran against
    pull_requests:
      type: array
      items:
        $ref: '#/components/schemas/CheckRunPR'
      default: []
```

### Handler Logic

Same as `check_run` handler — shared `dispatch_devops_agent()` function handles both event types.
