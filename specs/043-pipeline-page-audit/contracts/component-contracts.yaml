# ============================================================================
# CROSS-CUTTING AUDIT REQUIREMENTS
# ============================================================================

cross_cutting:
  design_consistency:
    - All colors from CSS custom properties or Tailwind theme classes
    - No hardcoded hex values, bg-white, text-black, etc.
    - Consistent spacing using Tailwind scale (gap-4, p-6, etc.)
    - No arbitrary values like p-[13px]
    - All content sections use Card component
    - Typography follows Celestial system
    - Shadows and radii from design tokens

  accessibility_wcag_aa:
    - 4.5:1 contrast ratio for normal text
    - 3:1 contrast ratio for large text and UI components
    - All interactive elements keyboard accessible
    - Visible focus indicators (celestial-focus or focus-visible:ring)
    - Focus trapping in all dialogs/modals
    - ARIA attributes on custom controls
    - Status conveyed via icon + text, not color alone
    - Form inputs have associated labels
    - Error messages programmatically associated with inputs

  responsive_breakpoints:
    - "Desktop (1280px+): full multi-section layout"
    - "Tablet/Laptop (768px-1279px): sections stack or adapt"
    - "Below 768px: not required for pipeline builder"

  performance:
    - No unnecessary re-renders in list items
    - Stable key props (item.id, never index)
    - Memoized derived computations
    - No duplicate API calls between parent and child
    - Callbacks via useCallback when passed to memoized children

  error_handling:
    - "User-friendly format: Could not [action]. [Reason]. [Next step]."
    - Rate limit detection via isRateLimitApiError()
    - Section-level error isolation
    - Success feedback via toast for all mutations
    - No raw error codes or stack traces shown to users
