<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e" />
      <stop offset="50%" stop-color="#16213e" />
      <stop offset="100%" stop-color="#0f3460" />
    </linearGradient>
    <radialGradient id="sun-glow" cx="260" cy="200" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f4a261" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#f4a261" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="moon-glow" cx="540" cy="200" r="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a8b8d8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#a8b8d8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="url(#sky)" />

  <!-- Stars -->
  <circle cx="80" cy="60" r="1.5" fill="#e9c46a" opacity="0.8" />
  <circle cx="150" cy="120" r="1" fill="#ffffff" opacity="0.6" />
  <circle cx="200" cy="40" r="1.2" fill="#ffffff" opacity="0.7" />
  <circle cx="350" cy="80" r="1" fill="#e9c46a" opacity="0.5" />
  <circle cx="420" cy="50" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="500" cy="90" r="1" fill="#ffffff" opacity="0.8" />
  <circle cx="600" cy="40" r="1.3" fill="#e9c46a" opacity="0.7" />
  <circle cx="680" cy="100" r="1" fill="#ffffff" opacity="0.5" />
  <circle cx="720" cy="60" r="1.5" fill="#ffffff" opacity="0.6" />
  <circle cx="100" cy="300" r="1" fill="#ffffff" opacity="0.4" />
  <circle cx="700" cy="320" r="1.2" fill="#e9c46a" opacity="0.5" />
  <circle cx="380" cy="340" r="1" fill="#ffffff" opacity="0.3" />
  <circle cx="50" cy="200" r="1" fill="#ffffff" opacity="0.5" />
  <circle cx="750" cy="200" r="1.3" fill="#e9c46a" opacity="0.6" />

  <!-- Outer orbit ring -->
  <ellipse cx="400" cy="200" rx="280" ry="140" stroke="#e9c46a" stroke-width="0.5" opacity="0.2" />

  <!-- Inner orbit ring -->
  <ellipse cx="400" cy="200" rx="180" ry="90" stroke="#a8b8d8" stroke-width="0.5" opacity="0.25" />

  <!-- Sun glow -->
  <circle cx="260" cy="200" r="120" fill="url(#sun-glow)" />

  <!-- Sun body -->
  <circle cx="260" cy="200" r="56" fill="#f4a261" />
  <circle cx="260" cy="200" r="48" fill="#e9c46a" />

  <!-- Sun rays -->
  <line x1="260" y1="130" x2="260" y2="115" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
  <line x1="260" y1="270" x2="260" y2="285" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
  <line x1="190" y1="200" x2="175" y2="200" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
  <line x1="330" y1="200" x2="345" y2="200" stroke="#f4a261" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
  <line x1="210" y1="150" x2="200" y2="140" stroke="#f4a261" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <line x1="310" y1="150" x2="320" y2="140" stroke="#f4a261" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <line x1="210" y1="250" x2="200" y2="260" stroke="#f4a261" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <line x1="310" y1="250" x2="320" y2="260" stroke="#f4a261" stroke-width="2" stroke-linecap="round" opacity="0.5" />

  <!-- Moon glow -->
  <circle cx="540" cy="200" r="100" fill="url(#moon-glow)" />

  <!-- Moon body -->
  <circle cx="540" cy="200" r="44" fill="#c8d6e5" />
  <!-- Moon shadow (crescent effect) -->
  <circle cx="556" cy="192" r="36" fill="#16213e" />

  <!-- Connecting arc between sun and moon -->
  <path d="M 320 200 Q 400 140 480 200" stroke="#e9c46a" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 4" />
  <path d="M 320 200 Q 400 260 480 200" stroke="#a8b8d8" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4 4" />

  <!-- Small decorative dot at center -->
  <circle cx="400" cy="200" r="3" fill="#e9c46a" opacity="0.6" />
</svg>
