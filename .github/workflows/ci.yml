name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default: no permissions. Each job grants only what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backend tests run directly on the runner
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Dependency audit with pip-audit
        run: pip-audit

      - name: Lint with ruff
        run: ruff check src tests

      - name: Format check with ruff
        run: ruff format --check src tests

      - name: Security scan with bandit
        run: bandit -r src/ -ll -ii --skip B104,B608

      - name: Type check with pyright
        run: pyright src

      - name: Run tests with coverage enforcement
        run: pytest --cov=src --cov-report=term-missing --durations=20 --ignore=tests/property --ignore=tests/fuzz --ignore=tests/chaos --ignore=tests/concurrency

  # Backend advanced tests: property-based, fuzz, chaos, concurrency
  backend-advanced-tests:
    name: Backend Advanced Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run property-based tests
        run: pytest tests/property/ --timeout=120 -v
        env:
          HYPOTHESIS_PROFILE: ci

      - name: Run fuzz tests
        run: pytest tests/fuzz/ --timeout=120 -v

      - name: Run chaos tests
        run: pytest tests/chaos/ --timeout=120 -v

      - name: Run concurrency tests
        run: pytest tests/concurrency/ --timeout=120 -v

  # Frontend tests run directly on the runner
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Run tests with coverage enforcement
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # Documentation linting — markdownlint + link verification
  docs:
    name: Docs Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli and markdown-link-check
        run: npm install -g markdownlint-cli@0.48.0 markdown-link-check@3.14.2

      - name: Lint markdown formatting
        run: markdownlint "solune/docs/**/*.md" "*.md" --config solune/.markdownlint.json

      - name: Check documentation links
        run: |
          find solune/docs -name "*.md" -print0 | xargs -0 -I {} \
            markdown-link-check {} \
              --config solune/.markdown-link-check.json \
              --quiet
          markdown-link-check README.md \
            --config solune/.markdown-link-check.json \
            --quiet

  # Verify architecture diagrams are in sync with the codebase
  diagrams:
    name: Diagrams
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify diagrams are up to date
        run: ./solune/scripts/generate-diagrams.sh --check

  # API contract validation — detect backend/frontend schema drift
  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -e ".[dev]"
        working-directory: solune/backend

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: solune/frontend

      - name: Run contract validation
        run: bash solune/scripts/validate-contracts.sh

  # Docker build verification
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build backend image
        run: docker build -t solune-backend ./solune/backend

      - name: Build frontend image
        run: docker build -t solune-frontend ./solune/frontend

      - name: Verify images
        run: |
          docker images | grep solune
