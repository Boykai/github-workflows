name: Mutation Testing

on:
  schedule:
    # Weekly on Sundays at 2am UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions: {}

jobs:
  backend-mutation:
    name: Backend Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard:
          - auth-and-projects
          - orchestration
          - app-and-data
          - agents-and-integrations
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mutmut
        run: python scripts/run_mutmut_shard.py --shard "${{ matrix.shard }}" --max-children 1

      - name: Generate mutmut report
        if: always()
        run: python -m mutmut results > "mutmut-report-${{ matrix.shard }}.txt" 2>&1

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-mutation-report-${{ matrix.shard }}
          path: solune/backend/mutmut-report-${{ matrix.shard }}.txt
          retention-days: 30
          if-no-files-found: warn

  frontend-mutation:
    name: Frontend Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Stryker
        run: npx stryker run

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-mutation-report
          path: solune/frontend/reports/mutation/
          retention-days: 30
          if-no-files-found: warn
