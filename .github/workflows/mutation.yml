name: Mutation Testing (Weekly)

on:
  schedule:
    # Weekly on Mondays at 3am UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

# Default: no permissions. Each job grants only what it needs.
permissions: {}

jobs:
  # Backend mutation testing with mutmut, split across named shards
  backend-mutation:
    name: Backend Mutation
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [auth-and-projects, orchestration, app-and-data, agents-and-integrations]
    defaults:
      run:
        working-directory: solune/backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mutmut shard ${{ matrix.shard }}
        run: |
          python scripts/run_mutmut_shard.py --shard ${{ matrix.shard }} \
            2>&1 | tee mutmut-report-${{ matrix.shard }}.txt

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: backend-mutation-report-${{ matrix.shard }}
          path: solune/backend/mutmut-report-${{ matrix.shard }}.txt
          retention-days: 30
          if-no-files-found: warn

  # Frontend mutation testing
  frontend-mutation:
    name: Frontend Mutation
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    defaults:
      run:
        working-directory: solune/frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: solune/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mutation testing
        run: npm run test:mutate

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: frontend-mutation-report
          path: solune/frontend/reports/mutation/
          retention-days: 30
          if-no-files-found: warn
