name: Copilot Setup Steps

# Runs when the Copilot coding agent starts, before it begins working.
# Must be on the default branch (main) to take effect.
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install CodeGraphContext
        run: pip install codegraphcontext

      - name: Index the repository
        run: cgc index .
        env:
          IGNORE_TEST_FILES: "false"
          IGNORE_HIDDEN_FILES: "true"
          MAX_FILE_SIZE_MB: "10"

      - name: Start CodeGraphContext MCP server
        run: cgc mcp start &
        env:
          IGNORE_TEST_FILES: "false"
          IGNORE_HIDDEN_FILES: "true"
          MAX_FILE_SIZE_MB: "10"
